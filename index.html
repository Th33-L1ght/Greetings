<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Cards</title>
<link href="https://fonts.googleapis.com/css2?family=Georgia&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: linear-gradient(160deg, #2d3a1e 0%, #3d4f28 40%, #4a5e30 70%, #2a3518 100%);
  color: #f0ead8;
  font-family: Georgia, 'Times New Roman', serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.6rem;
  padding: 2rem;
}

h1 {
  font-size: 0.72rem;
  letter-spacing: 0.42em;
  color: rgba(240,234,216,0.5);
  font-weight: normal;
  text-transform: uppercase;
}

.buttons {
  display: flex;
  gap: 0.6rem;
  flex-wrap: wrap;
  justify-content: center;
}

button {
  background: rgba(240,234,216,0.08);
  border: 1px solid rgba(240,234,216,0.3);
  color: rgba(240,234,216,0.85);
  padding: 0.75rem 1.5rem;
  cursor: pointer;
  transition: all 0.22s;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 1rem;
  letter-spacing: 0.04em;
  border-radius: 2px;
}

button:hover {
  background: rgba(240,234,216,0.15);
  border-color: rgba(240,234,216,0.7);
  color: #f0ead8;
}

.personalise-toggle {
  font-size: 0.76rem;
  opacity: 0.45;
  border-color: rgba(240,234,216,0.12);
  padding: 0.4rem 1rem;
  background: transparent;
}
.personalise-toggle:hover { opacity: 1; }

.personalise-panel {
  display: none;
  flex-direction: column;
  gap: 0.85rem;
  background: rgba(0,0,0,0.2);
  border: 1px solid rgba(240,234,216,0.15);
  padding: 1.4rem;
  width: 320px;
  border-radius: 3px;
}
.personalise-panel.open { display: flex; }

.personalise-panel label {
  font-size: 0.68rem;
  letter-spacing: 0.16em;
  color: rgba(240,234,216,0.45);
  text-transform: uppercase;
  margin-bottom: 0.18rem;
  display: block;
  font-family: Georgia, serif;
}

.personalise-panel input {
  background: rgba(240,234,216,0.07);
  border: 1px solid rgba(240,234,216,0.18);
  color: #f0ead8;
  padding: 0.6rem 0.9rem;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 1rem;
  width: 100%;
  outline: none;
  border-radius: 2px;
}
.personalise-panel input:focus { border-color: rgba(240,234,216,0.45); }
.personalise-panel input::placeholder { color: rgba(240,234,216,0.22); }

.card-wrap {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  opacity: 0;
  transition: opacity 0.45s;
}
.card-wrap.visible { display: flex; }
.card-wrap.shown { opacity: 1; }

canvas {
  border-radius: 6px;
  display: block;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

.card-actions { display: flex; gap: 0.65rem; }
</style>
</head>

<body>

<h1>Send a little love</h1>

<div class="buttons">
  <button onclick="generate('morning')">Good Morning</button>
  <button onclick="generate('day')">Good Day</button>
  <button onclick="generate('evening')">Good Evening</button>
</div>

<button class="personalise-toggle" onclick="togglePanel()">✦ Personalise</button>

<div class="personalise-panel" id="panel">
  <div>
    <label>Friend's name or nickname</label>
    <input id="nickname" type="text" placeholder="e.g. Fatima">
  </div>
  <div>
    <label>A word that describes her</label>
    <input id="adjective" type="text" placeholder="e.g. radiant">
  </div>
  <div>
    <label>Your name (sign-off)</label>
    <input id="sender" type="text" placeholder="e.g. Noora">
  </div>
</div>

<div class="card-wrap" id="wrap">
  <canvas id="canvas" width="380" height="380"></canvas>
  <div class="card-actions">
    <button onclick="generate(currentType)">Regenerate</button>
    <button onclick="downloadCard()">Download</button>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let currentType = null;

function togglePanel(){ document.getElementById("panel").classList.toggle("open"); }
function r(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function rand(min,max){ return Math.random()*(max-min)+min; }
function randInt(min,max){ return Math.floor(rand(min,max+1)); }

/* ============================================================
   MESSAGE ENGINE — every card starts with the greeting
   ============================================================ */
function makeMessage(type){
  const nickname  = document.getElementById("nickname").value.trim();
  const adjective = document.getElementById("adjective").value.trim();
  const sender    = document.getElementById("sender").value.trim();
  const name = nickname ? ", " + nickname : "";

  const greeting =
    type==="morning" ? "Good morning" + name + "." :
    type==="day"     ? "Good day" + name + "."     :
                       "Good evening" + name + ".";

  let line2, line3;

  if(type==="morning"){
    const wishes = [
      "May today be gentle and kind to you.",
      "Wishing you a beautiful, easy morning.",
      "Hope this day holds something lovely for you.",
      "May your morning be calm and your heart be light.",
      "Sending you warmth to start your day.",
      "May today be everything you need it to be.",
      "Hope you wake up to something that makes you smile.",
    ];
    const extras = [
      adjective ? `You are ${adjective} — don't forget that today.` : "You are more loved than you know.",
      "Take it one moment at a time.",
      "No rush. The day is yours.",
      "Breathe first. Everything else can wait.",
      "A warm cup and a quiet moment — that's a good start.",
      "Let today be lighter than yesterday.",
      adjective ? `Someone ${adjective} deserves a wonderful morning.` : "Someone wonderful deserves a wonderful morning.",
      "You've already done the hard part — you showed up.",
    ];
    line2 = r(wishes);
    line3 = r(extras);
  }

  else if(type==="day"){
    const wishes = [
      "Hope your day is going well.",
      "Wishing you a calm and steady afternoon.",
      "Hope today is treating you kindly.",
      "Sending you a little warmth right now.",
      "Hope there's something good in your day today.",
      "May the rest of today be easy on you.",
      "Hope you've had a moment to breathe today.",
    ];
    const extras = [
      adjective ? `You are ${adjective} and the world is better for it.` : "You matter more than you realise.",
      "Be gentle with yourself today.",
      "One thing at a time — you've got it.",
      "Don't forget to drink some water.",
      "Even ordinary days can hold a little magic.",
      "Take a breath. You are doing fine.",
      adjective ? `Stay ${adjective}. The world needs it.` : "Stay kind to yourself today.",
    ];
    line2 = r(wishes);
    line3 = r(extras);
  }

  else {
    const wishes = [
      "You have done enough for today — truly.",
      "Let the evening hold you gently.",
      "Put the day down and let yourself rest.",
      "Tonight belongs to quiet and calm.",
      "The hard parts are behind you now.",
      "May your evening be soft and still.",
      "Let go of today and breathe easy.",
    ];
    const extras = [
      adjective ? `You are ${adjective} — even on the hard days.` : "You did well today, even if it didn't feel like it.",
      "Sweet dreams when you get there.",
      "May your sleep be deep and kind.",
      "Tomorrow can wait. Rest now.",
      "You are allowed to rest without guilt.",
      "Close your eyes knowing you are loved.",
      adjective ? `Someone ${adjective} deserves a peaceful night.` : "Someone wonderful deserves a peaceful night.",
    ];
    line2 = r(wishes);
    line3 = r(extras);
  }

  return {
    greeting,
    line2,
    line3,
    from: sender ? (type==="evening" ? "Goodnight from " + sender : "With love, " + sender) : ""
  };
}

/* ============================================================
   TEXT DRAWING — big plain Georgia, NO blur, NO shadow
   ============================================================ */
function drawText(msg, dark){
  const W=380, H=380;
  const textColor = dark ? "#ffffff" : "#1a1208";
  const subColor  = dark ? "rgba(255,255,255,0.88)" : "rgba(20,14,4,0.78)";
  const fromColor = dark ? "rgba(255,255,255,0.68)" : "rgba(20,14,4,0.5)";

  // clean overlay for readability — no blur
  if(dark){
    const ov=ctx.createLinearGradient(0,H*0.25,0,H);
    ov.addColorStop(0,"rgba(0,0,0,0)");
    ov.addColorStop(1,"rgba(0,0,0,0.52)");
    ctx.fillStyle=ov; ctx.fillRect(0,0,W,H);
  } else {
    const ov=ctx.createLinearGradient(0,H*0.25,0,H);
    ov.addColorStop(0,"rgba(255,255,255,0)");
    ov.addColorStop(1,"rgba(255,255,255,0.42)");
    ctx.fillStyle=ov; ctx.fillRect(0,0,W,H);
  }

  ctx.shadowBlur = 0;
  ctx.shadowColor = "transparent";
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";

  const cx = W/2;
  const maxW = 320;
  const lh1=36, lh2=30, lh3=28, lh4=24;
  const gap=12;

  // measure helper
  function measureBlock(text, font, lh){
    ctx.font = font;
    const words=text.split(" ");
    let line="", lines=1;
    for(let i=0;i<words.length;i++){
      const test=line+words[i]+" ";
      if(ctx.measureText(test).width>maxW && i>0){ lines++; line=words[i]+" "; }
      else line=test;
    }
    return lines*lh;
  }

  const f1=`bold 24px Georgia,'Times New Roman',serif`;
  const f2=`22px Georgia,'Times New Roman',serif`;
  const f3=`italic 20px Georgia,'Times New Roman',serif`;
  const f4=`italic 17px Georgia,'Times New Roman',serif`;

  const h1=measureBlock(msg.greeting,f1,lh1);
  const h2=measureBlock(msg.line2,f2,lh2);
  const h3=measureBlock(msg.line3,f3,lh3);
  const h4=msg.from?measureBlock(msg.from,f4,lh4):0;
  const totalH=h1+gap+h2+gap+h3+(h4?gap+h4:0);

  let y=H/2 - totalH/2 + lh1*0.75;

  function drawBlock(text, font, lh, color){
    ctx.font=font;
    ctx.fillStyle=color;
    const words=text.split(" ");
    let line="";
    let cy=y;
    for(let i=0;i<words.length;i++){
      const test=line+words[i]+" ";
      if(ctx.measureText(test).width>maxW && i>0){
        ctx.fillText(line.trim(),cx,cy);
        line=words[i]+" ";
        cy+=lh;
      } else line=test;
    }
    ctx.fillText(line.trim(),cx,cy);
    y=cy+gap;
    return cy;
  }

  drawBlock(msg.greeting, f1, lh1, textColor);
  y += gap*0.5;
  drawBlock(msg.line2, f2, lh2, subColor);
  y += gap*0.5;
  drawBlock(msg.line3, f3, lh3, subColor);
  if(msg.from){
    y += gap*0.5;
    drawBlock(msg.from, f4, lh4, fromColor);
  }
}

/* ============================================================
   MORNING SCENES
   ============================================================ */
function drawSunrise(){
  const g=ctx.createLinearGradient(0,0,0,380);
  g.addColorStop(0,"#1a0a2e"); g.addColorStop(0.35,"#7a1a4a");
  g.addColorStop(0.65,"#c0502a"); g.addColorStop(0.85,"#f4a030"); g.addColorStop(1,"#fde4a0");
  ctx.fillStyle=g; ctx.fillRect(0,0,380,380);
  ctx.fillStyle="rgba(255,200,80,0.13)"; ctx.beginPath(); ctx.arc(190,218,112,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(255,180,60,0.22)"; ctx.beginPath(); ctx.arc(190,218,66,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#ffd060"; ctx.beginPath(); ctx.arc(190,218,34,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle="rgba(255,200,100,0.22)"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,238); ctx.lineTo(380,238); ctx.stroke();
  ctx.fillStyle="#0d0608";
  for(let i=0;i<7;i++){
    const tx=25+i*55+rand(-8,8),th=rand(65,115);
    ctx.beginPath(); ctx.moveTo(tx-14,380); ctx.bezierCurveTo(tx-8,380-th*0.5,tx+8,380-th*0.75,tx+14,380); ctx.fill();
  }
  return true;
}

function drawPastelDawn(){
  const g=ctx.createLinearGradient(0,0,0,380);
  g.addColorStop(0,"#f9d4e8"); g.addColorStop(0.4,"#fce4c8");
  g.addColorStop(0.75,"#fef0d8"); g.addColorStop(1,"#fff8f0");
  ctx.fillStyle=g; ctx.fillRect(0,0,380,380);
  ctx.fillStyle="rgba(255,210,140,0.5)"; ctx.beginPath(); ctx.arc(190,312,92,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(255,220,160,0.65)"; ctx.beginPath(); ctx.arc(190,312,56,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(255,235,180,0.9)"; ctx.beginPath(); ctx.arc(190,312,30,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(255,255,255,0.72)";
  [[80,90,70,22],[205,60,92,26],[315,102,62,18],[145,132,52,15],[272,142,66,19]].forEach(([cx,cy,rx,ry])=>{
    ctx.beginPath(); ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx-rx*0.35,cy+ry*0.4,rx*0.6,ry*0.7,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+rx*0.35,cy+ry*0.4,rx*0.6,ry*0.7,0,0,Math.PI*2); ctx.fill();
  });
  return false;
}

function drawMorningSea(){
  const g=ctx.createLinearGradient(0,0,0,380);
  g.addColorStop(0,"#b8daf4"); g.addColorStop(0.5,"#d8eef8");
  g.addColorStop(0.65,"#f8e8c8"); g.addColorStop(1,"#f0d090");
  ctx.fillStyle=g; ctx.fillRect(0,0,380,380);
  ctx.fillStyle="rgba(255,220,100,0.6)"; ctx.beginPath(); ctx.arc(190,248,72,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(255,230,120,0.85)"; ctx.beginPath(); ctx.arc(190,248,42,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#ffe880"; ctx.beginPath(); ctx.arc(190,248,21,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,0.45)"; ctx.lineWidth=1.5;
  for(let i=0;i<8;i++){
    const sy=268+i*13;
    ctx.beginPath(); ctx.moveTo(rand(10,120),sy); ctx.lineTo(rand(150,232),sy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(rand(200,272),sy+3); ctx.lineTo(rand(300,372),sy+3); ctx.stroke();
  }
  ctx.strokeStyle="rgba(200,160,80,0.4)"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,250); ctx.lineTo(380,250); ctx.stroke();
  return false;
}

function drawMistyForest(){
  const g=ctx.createLinearGradient(0,0,0,380);
  g.addColorStop(0,"#0e1a10"); g.addColorStop(0.5,"#1a2e1c"); g.addColorStop(1,"#0a1008");
  ctx.fillStyle=g; ctx.fillRect(0,0,380,380);
  for(let m=0;m<5;m++){
    const mg=ctx.createRadialGradient(rand(60,320),rand(150,280),10,rand(60,320),rand(150,280),rand(80,150));
    mg.addColorStop(0,`rgba(180,220,190,${rand(0.05,0.13)})`); mg.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=mg; ctx.fillRect(0,0,380,380);
  }
  for(let i=0;i<14;i++){
    const tx=rand(0,380),th=rand(120,270),tw=rand(6,17);
    ctx.fillStyle=`rgba(8,18,10,${rand(0.15,0.5)})`;
    ctx.beginPath(); ctx.moveTo(tx-tw,380); ctx.lineTo(tx-tw*0.4,380-th); ctx.lineTo(tx+tw*0.4,380-th); ctx.lineTo(tx+tw,380); ctx.fill();
  }
  ctx.save();
  for(let i=0;i<4;i++){
    const lx=rand(60,320);
    const rg=ctx.createLinearGradient(lx,0,lx+rand(-30,30),380);
    rg.addColorStop(0,`rgba(180,230,190,${rand(0.04,0.09)})`); rg.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=rg; ctx.beginPath(); ctx.moveTo(lx-10,0); ctx.lineTo(lx+10,0); ctx.lineTo(lx+50,380); ctx.lineTo(lx-50,380); ctx.fill();
  }
  ctx.restore();
  return true;
}

function drawFlowerMeadow(){
  const g=ctx.createLinearGradient(0,0,0,380);
  g.addColorStop(0,"#7ac8e8"); g.addColorStop(0.45,"#b8e0c8"); g.addColorStop(1,"#4a8830");
  ctx.fillStyle=g; ctx.fillRect(0,0,380,380);
  ctx.fillStyle="rgba(255,255,255,0.75)";
  for(let i=0;i<5;i++){ ctx.beginPath(); ctx.ellipse(rand(20,360),rand(25,90),rand(35,75),rand(12,20),0,0,Math.PI*2); ctx.fill(); }
  ctx.strokeStyle="#3a7228"; ctx.lineWidth=1.5;
  for(let i=0;i<24;i++){
    const sx=rand(5,375);
    ctx.beginPath(); ctx.moveTo(sx,380); ctx.quadraticCurveTo(sx+rand(-12,12),380-rand(25,55),sx+rand(-5,5),380-rand(55,100)); ctx.stroke();
  }
  const petals=["#e87c9c","#f4c842","#c084e8","#f28050","#ffffff","#f472b6","#a78bfa"];
  for(let i=0;i<50;i++){
    const fx=rand(5,375),fy=rand(180,375),pr=rand(5,11),pc=petals[randInt(0,petals.length-1)];
    ctx.fillStyle=pc;
    for(let p=0;p<6;p++){
      const a=(p/6)*Math.PI*2;
      ctx.beginPath(); ctx.ellipse(fx+Math.cos(a)*pr*0.9,fy+Math.sin(a)*pr*0.9,pr*0.5,pr*0.3,a,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle="#ffe066"; ctx.beginPath(); ctx.arc(fx,fy,pr*0.35,0,Math.PI*2); ctx.fill();
  }
  return false;
}

function drawTeaCup(){
  const g=ctx.createLinearGradient(0,0,0,380);
  g.addColorStop(0,"#1a0e06"); g.addColorStop(1,"#3c2010");
  ctx.fillStyle=g; ctx.fillRect(0,0,380,380);
  for(let i=0;i<50;i++){
    ctx.fillStyle=`rgba(255,190,100,${rand(0.02,0.1)})`; ctx.beginPath(); ctx.arc(rand(0,380),rand(0,380),rand(1,4),0,Math.PI*2); ctx.fill();
  }
  const cx=190,cy=200;
  const sg=ctx.createLinearGradient(cx-70,cy+55,cx+70,cy+65);
  sg.addColorStop(0,"#8a6840"); sg.addColorStop(0.5,"#c8a060"); sg.addColorStop(1,"#8a6840");
  ctx.fillStyle=sg; ctx.beginPath(); ctx.ellipse(cx,cy+62,72,14,0,0,Math.PI*2); ctx.fill();
  const cg=ctx.createLinearGradient(cx-58,0,cx+58,0);
  cg.addColorStop(0,"#c8bca8"); cg.addColorStop(0.3,"#f0ece0"); cg.addColorStop(1,"#b8a898");
  ctx.fillStyle=cg;
  ctx.beginPath(); ctx.moveTo(cx-56,cy-12); ctx.bezierCurveTo(cx-59,cy+28,cx-47,cy+55,cx-28,cy+57); ctx.lineTo(cx+28,cy+57); ctx.bezierCurveTo(cx+47,cy+55,cx+59,cy+28,cx+56,cy-12); ctx.closePath(); ctx.fill();
  ctx.fillStyle="#6b3a1f"; ctx.beginPath(); ctx.ellipse(cx,cy-12,56,14,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#8b5a2f"; ctx.beginPath(); ctx.ellipse(cx,cy-14,51,11,0,0,Math.PI*2); ctx.fill();
  const rg=ctx.createLinearGradient(cx-56,cy-20,cx+56,cy-8);
  rg.addColorStop(0,"#d8d0bc"); rg.addColorStop(0.5,"#fff8f0"); rg.addColorStop(1,"#c8c0ac");
  ctx.fillStyle=rg; ctx.beginPath(); ctx.ellipse(cx,cy-12,56,14,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle="#d0c4b0"; ctx.lineWidth=5;
  ctx.beginPath(); ctx.arc(cx+59,cy+22,20,-0.7,0.7); ctx.stroke();
  ctx.strokeStyle="rgba(255,255,255,0.18)"; ctx.lineWidth=2;
  for(let i=0;i<3;i++){
    ctx.beginPath(); ctx.moveTo(cx-10+i*10,cy-28); ctx.bezierCurveTo(cx-18+i*10,cy-48,cx+6+i*10,cy-58,cx+i*10,cy-78); ctx.stroke();
  }
  return true;
}

function drawGoldenWheat(){
  // golden wheat field morning
  const g=ctx.createLinearGradient(0,0,0,380);
  g.addColorStop(0,"#88c4e8"); g.addColorStop(0.5,"#c8e0f0"); g.addColorStop(0.7,"#f0d890"); g.addColorStop(1,"#c8a040");
  ctx.fillStyle=g; ctx.fillRect(0,0,380,380);
  // sun
  ctx.fillStyle="rgba(255,230,100,0.35)"; ctx.beginPath(); ctx.arc(60,80,65,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(255,235,120,0.6)"; ctx.beginPath(); ctx.arc(60,80,40,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#ffe860"; ctx.beginPath(); ctx.arc(60,80,22,0,Math.PI*2); ctx.fill();
  // wheat stalks
  ctx.strokeStyle="#c8901a"; ctx.lineWidth=1.5;
  for(let i=0;i<40;i++){
    const sx=rand(0,380),sy=380;
    const bend=rand(-18,18);
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.quadraticCurveTo(sx+bend,sy-rand(60,120),sx+bend*1.5,sy-rand(120,180)); ctx.stroke();
    // wheat head
    ctx.fillStyle=`rgba(210,160,30,${rand(0.6,1)})`;
    ctx.beginPath(); ctx.ellipse(sx+bend*1.5,sy-rand(120,180),3,9,rand(-0.3,0.3),0,Math.PI*2); ctx.fill();
  }
  return false;
}

function drawCherryBlossom(){
  // soft pink cherry blossom morning
  const g=ctx.createLinearGradient(0,0,0,380);
  g.addColorStop(0,"#f0c8e0"); g.addColorStop(0.5,"#f8dce8"); g.addColorStop(1,"#fceef4");
  ctx.fillStyle=g; ctx.fillRect(0,0,380,380);
  // tree trunk
  ctx.strokeStyle="#7a4a2a"; ctx.lineWidth=8;
  ctx.beginPath(); ctx.moveTo(190,380); ctx.quadraticCurveTo(185,260,160,160); ctx.stroke();
  ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(160,160); ctx.quadraticCurveTo(120,110,90,80); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(160,160); ctx.quadraticCurveTo(200,120,240,90); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(175,200); ctx.quadraticCurveTo(230,170,270,155); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(175,200); ctx.quadraticCurveTo(140,175,110,165); ctx.stroke();
  // blossoms
  const pinks=["#f4a8c8","#f8bcd4","#ffccdd","#f090b8","#fce4f0","#ff90b4"];
  for(let i=0;i<120;i++){
    const bx=rand(40,340),by=rand(30,280),br=rand(4,10);
    ctx.fillStyle=pinks[randInt(0,pinks.length-1)];
    for(let p=0;p<5;p++){
      const a=(p/5)*Math.PI*2;
      ctx.beginPath(); ctx.ellipse(bx+Math.cos(a)*br*0.85,by+Math.sin(a)*br*0.85,br*0.45,br*0.3,a,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle="#fff0f6"; ctx.beginPath(); ctx.arc(bx,by,br*0.28,0,Math.PI*2); ctx.fill();
  }
  return false;
}

function drawStarryNight(){

  for(let i=0;i<110;i++){
    ctx.fillStyle=`rgba(255,255,240,${rand(0.4,1)})`; ctx.beginPath(); ctx.arc(rand(0,380),rand(0,270),rand(0.4,2),0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle="rgba(210,225,255,0.08)"; ctx.beginPath(); ctx.arc(275,80,55,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(220,232,255,0.18)"; ctx.beginPath(); ctx.arc(275,80,36,0,Math.PI*2); ctx.fill();

  ctx.fillStyle="#0a0818"; ctx.beginPath(); ctx.moveTo(0,380); ctx.bezierCurveTo(60,250,140,275,200,258); ctx.bezierCurveTo(260,240,310,265,380,252); ctx.lineTo(380,380); ctx.fill();
  ctx.fillStyle="#060510"; ctx.beginPath(); ctx.moveTo(0,380); ctx.bezierCurveTo(80,295,180,315,260,295); ctx.bezierCurveTo(300,282,330,298,380,288); ctx.lineTo(380,380); ctx.fill();

function drawSleepyCloudsNight(){
  const g=ctx.createLinearGradient(0,0,0,380);
  g.addColorStop(0,"#04081a"); g.addColorStop(0.6,"#0c1430"); g.addColorStop(1,"#181828");
  ctx.fillStyle=g; ctx.fillRect(0,0,380,380);
  for(let i=0;i<80;i++){
    ctx.fillStyle=`rgba(220,225,255,${rand(0.2,0.85)})`; ctx.beginPath(); ctx.arc(rand(0,380),rand(0,220),rand(0.3,1.6),0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle="rgba(220,230,255,0.07)"; ctx.beginPath(); ctx.arc(100,90,60,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(225,232,255,0.15)"; ctx.beginPath(); ctx.arc(100,90,40,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#dce8ff"; ctx.beginPath(); ctx.arc(100,90,25,0,Math.PI*2); ctx.fill();
  function sleepyCloud(scx,scy,sc,al){
    ctx.save(); ctx.globalAlpha=al;
    ctx.fillStyle="#c8d4f0";
    ctx.beginPath(); ctx.ellipse(scx,scy,55*sc,22*sc,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(scx-20*sc,scy-14*sc,28*sc,18*sc,-0.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(scx+10*sc,scy-16*sc,32*sc,20*sc,0.15,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(scx+35*sc,scy-8*sc,22*sc,15*sc,0.1,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=al*0.7; ctx.fillStyle="#a0aed0";
    ctx.font=`bold ${Math.round(11*sc)}px Georgia,serif`; ctx.textAlign="left";
    ctx.fillText("z",scx+50*sc,scy-22*sc);
    ctx.font=`bold ${Math.round(9*sc)}px Georgia,serif`; ctx.fillText("z",scx+60*sc,scy-34*sc);
    ctx.font=`bold ${Math.round(7*sc)}px Georgia,serif`; ctx.fillText("z",scx+68*sc,scy-44*sc);
    ctx.restore();
  }
  sleepyCloud(160,155,1.0,0.55); sleepyCloud(50,205,0.75,0.4); sleepyCloud(275,235,0.85,0.45);
  ctx.fillStyle="#060810"; ctx.beginPath(); ctx.moveTo(0,380); ctx.bezierCurveTo(100,312,250,332,380,310); ctx.lineTo(380,380); ctx.fill();
  return true;
}

function drawDeepNightMoon(){
  const g=ctx.createLinearGradient(0,0,0,380);
  g.addColorStop(0,"#060210"); g.addColorStop(0.45,"#100838"); g.addColorStop(1,"#1a0a28");
  ctx.fillStyle=g; ctx.fillRect(0,0,380,380);
  for(let i=0;i<120;i++){
    const bri=rand(0.3,1);
    ctx.fillStyle=`rgba(255,250,220,${bri})`; ctx.beginPath(); ctx.arc(rand(0,380),rand(0,260),rand(0.3,bri>0.85?2.2:1.2),0,Math.PI*2); ctx.fill();
  }
  const mx=190,my=108;
  ctx.fillStyle="rgba(230,220,255,0.05)"; ctx.beginPath(); ctx.arc(mx,my,80,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(230,225,255,0.12)"; ctx.beginPath(); ctx.arc(mx,my,55,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(238,232,255,0.25)"; ctx.beginPath(); ctx.arc(mx,my,36,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#f0ecff"; ctx.beginPath(); ctx.arc(mx,my,26,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(200,192,240,0.35)"; ctx.beginPath(); ctx.arc(mx-9,my-6,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(200,192,240,0.25)"; ctx.beginPath(); ctx.arc(mx+10,my+8,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(200,192,240,0.2)"; ctx.beginPath(); ctx.arc(mx+6,my-12,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(140,130,170,0.18)";
  for(let i=0;i<4;i++){
    ctx.beginPath(); ctx.ellipse(rand(20,360),rand(55,200),rand(50,100),rand(8,18),rand(-0.2,0.2),0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle="#0a0620"; ctx.beginPath(); ctx.moveTo(0,380); ctx.bezierCurveTo(50,280,150,310,220,285); ctx.bezierCurveTo(280,262,330,285,380,270); ctx.lineTo(380,380); ctx.fill();
  ctx.fillStyle="#060418"; ctx.beginPath(); ctx.moveTo(0,380); ctx.bezierCurveTo(90,320,200,340,280,318); ctx.bezierCurveTo(320,305,350,318,380,310); ctx.lineTo(380,380); ctx.fill();

function drawSunset(){
  const g=ctx.createLinearGradient(0,0,0,380);
  g.addColorStop(0,"#08040e"); g.addColorStop(0.25,"#3a0a30");

function drawCandlelight(){
  const g=ctx.createLinearGradient(0,0,0,380);
  g.addColorStop(0,"#080400"); g.addColorStop(1,"#1e1000");
  ctx.fillStyle=g; ctx.fillRect(0,0,380,380);
  const cx=190,cy=205;
  const fg=ctx.createRadialGradient(cx,cy-80,5,cx,cy-60,135);
  fg.addColorStop(0,"rgba(255,180,60,0.42)"); fg.addColorStop(0.4,"rgba(255,100,20,0.16)"); fg.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=fg; ctx.fillRect(0,0,380,380);
  const cg=ctx.createLinearGradient(cx-14,0,cx+14,0);
  cg.addColorStop(0,"#d4c8b0"); cg.addColorStop(0.4,"#f0ece0"); cg.addColorStop(1,"#c8bca8");
  ctx.fillStyle=cg; ctx.fillRect(cx-14,cy-55,28,97);
  ctx.fillStyle="#e8e0cc"; ctx.beginPath(); ctx.ellipse(cx+8,cy-35,5,10,0.3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(255,200,60,0.5)"; ctx.beginPath(); ctx.ellipse(cx,cy-68,10,18,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#ff8c20"; ctx.beginPath(); ctx.ellipse(cx,cy-65,6,12,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#fff8a0"; ctx.beginPath(); ctx.ellipse(cx,cy-68,3,7,0,0,Math.PI*2); ctx.fill();
  const sg=ctx.createLinearGradient(cx-45,cy+38,cx+45,cy+48);
  sg.addColorStop(0,"#c8a870"); sg.addColorStop(0.5,"#e8d090"); sg.addColorStop(1,"#c8a870");
  ctx.fillStyle=sg; ctx.beginPath(); ctx.ellipse(cx,cy+43,43,10,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#b89860"; ctx.beginPath(); ctx.ellipse(cx,cy+40,41,8,0,0,Math.PI*2); ctx.fill();
  for(let i=0;i<30;i++){
    ctx.fillStyle=`rgba(255,180,60,${rand(0.02,0.1)})`; ctx.beginPath(); ctx.arc(rand(0,380),rand(0,380),rand(1,4),0,Math.PI*2); ctx.fill();
  }
  return true;
}

function drawRainyWindow(){
  const g=ctx.createLinearGradient(0,0,0,380);
  g.addColorStop(0,"#1a1e28"); g.addColorStop(1,"#0e1018");
  ctx.fillStyle=g; ctx.fillRect(0,0,380,380);
  const og=ctx.createRadialGradient(205,145,10,205,145,165);
  og.addColorStop(0,"rgba(255,200,100,0.1)"); og.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=og; ctx.fillRect(0,0,380,380);
  ctx.strokeStyle="rgba(180,200,230,0.3)"; ctx.lineWidth=1;
  for(let i=0;i<38;i++){
    const rx=rand(5,375),ry=rand(5,345),rl=rand(8,28);
    ctx.beginPath(); ctx.moveTo(rx,ry); ctx.lineTo(rx+rand(-3,3),ry+rl); ctx.stroke();
  }
  ctx.fillStyle="rgba(180,210,240,0.22)";
  for(let i=0;i<22;i++){
    ctx.beginPath(); ctx.ellipse(rand(5,375),rand(5,375),rand(2,5),rand(3,8),rand(-0.2,0.2),0,Math.PI*2); ctx.fill();
  }
  ctx.strokeStyle="rgba(80,60,40,0.8)"; ctx.lineWidth=10; ctx.strokeRect(5,5,370,370);
  ctx.strokeStyle="rgba(80,60,40,0.6)"; ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(190,5); ctx.lineTo(190,375); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5,190); ctx.lineTo(375,190); ctx.stroke();
  return true;
}

function drawPastelNight(){
  const g=ctx.createLinearGradient(0,0,0,380);
  g.addColorStop(0,"#1a1030"); g.addColorStop(0.5,"#2a1840"); g.addColorStop(1,"#180c28");
  ctx.fillStyle=g; ctx.fillRect(0,0,380,380);
  for(let i=0;i<90;i++){
    ctx.fillStyle=`rgba(240,220,255,${rand(0.15,0.7)})`; ctx.beginPath(); ctx.arc(rand(0,380),rand(0,260),rand(0.3,1.4),0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle="rgba(255,220,230,0.1)"; ctx.beginPath(); ctx.arc(280,85,52,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(255,225,235,0.2)"; ctx.beginPath(); ctx.arc(280,85,34,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#ffe4ec"; ctx.beginPath(); ctx.arc(280,85,21,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#2a1840"; ctx.beginPath(); ctx.arc(291,78,17,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(180,160,210,0.22)";
  for(let i=0;i<5;i++){
    ctx.beginPath(); ctx.ellipse(rand(20,360),rand(60,200),rand(45,90),rand(10,20),rand(-0.15,0.15),0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle="rgba(20,10,40,0.85)"; ctx.beginPath(); ctx.moveTo(0,380); ctx.bezierCurveTo(70,300,170,325,250,305); ctx.bezierCurveTo(300,290,345,308,380,298); ctx.lineTo(380,380); ctx.fill();
  return true;
}

function drawAuroraNight(){
  // deep teal-green aurora borealis
  const g=ctx.createLinearGradient(0,0,0,380);
  g.addColorStop(0,"#000810"); g.addColorStop(0.5,"#001820"); g.addColorStop(1,"#001008");
  ctx.fillStyle=g; ctx.fillRect(0,0,380,380);
  for(let i=0;i<100;i++){
    ctx.fillStyle=`rgba(200,240,220,${rand(0.15,0.8)})`; ctx.beginPath(); ctx.arc(rand(0,380),rand(0,200),rand(0.3,1.5),0,Math.PI*2); ctx.fill();
  }
  // aurora bands
  const auroraColors=["rgba(0,220,140,0.12)","rgba(0,180,200,0.10)","rgba(100,240,180,0.09)","rgba(0,240,160,0.08)"];
  for(let a=0;a<5;a++){
    ctx.fillStyle=auroraColors[a%auroraColors.length];
    ctx.beginPath();
    const ay=rand(60,180);
    ctx.moveTo(0,ay+rand(-20,20));
    for(let x=0;x<=380;x+=30){
      ctx.lineTo(x,ay+Math.sin(x*0.04+a)*rand(15,35)+rand(-8,8));
    }
    ctx.lineTo(380,ay+rand(20,50));
    ctx.lineTo(0,ay+rand(20,50));
    ctx.closePath(); ctx.fill();
  }
  // dark hills with pine tree silhouettes
  ctx.fillStyle="#001008";
  ctx.beginPath(); ctx.moveTo(0,380); ctx.bezierCurveTo(80,295,190,315,280,295); ctx.bezierCurveTo(320,284,350,295,380,288); ctx.lineTo(380,380); ctx.fill();
  // pine trees
  ctx.fillStyle="#000e06";
  for(let i=0;i<10;i++){
    const tx=rand(10,370), th=rand(50,100);
    const ty=380-rand(30,60);
    ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx-rand(10,18),ty+th*0.5); ctx.lineTo(tx+rand(10,18),ty+th*0.5); ctx.fill();
    ctx.beginPath(); ctx.moveTo(tx,ty-th*0.3); ctx.lineTo(tx-rand(7,13),ty+th*0.2); ctx.lineTo(tx+rand(7,13),ty+th*0.2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(tx,ty-th*0.65); ctx.lineTo(tx-rand(5,9),ty+th*0.05); ctx.lineTo(tx+rand(5,9),ty+th*0.05); ctx.fill();
  }
  return true;
}

function drawFireflyNight(){
  // warm dark summer night with fireflies
  const g=ctx.createLinearGradient(0,0,0,380);
  g.addColorStop(0,"#050408"); g.addColorStop(0.5,"#0c0e10"); g.addColorStop(1,"#080c04");
  ctx.fillStyle=g; ctx.fillRect(0,0,380,380);
  for(let i=0;i<60;i++){
    ctx.fillStyle=`rgba(200,210,255,${rand(0.1,0.6)})`; ctx.beginPath(); ctx.arc(rand(0,380),rand(0,200),rand(0.3,1.2),0,Math.PI*2); ctx.fill();
  }
  // thin crescent moon
  ctx.fillStyle="rgba(255,240,200,0.12)"; ctx.beginPath(); ctx.arc(310,65,38,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#fff5d8"; ctx.beginPath(); ctx.arc(310,65,18,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#0a0c08"; ctx.beginPath(); ctx.arc(320,60,15,0,Math.PI*2); ctx.fill();
  // dark tree line
  ctx.fillStyle="#040804";
  ctx.beginPath(); ctx.moveTo(0,380); ctx.bezierCurveTo(60,270,130,295,200,270); ctx.bezierCurveTo(260,250,320,275,380,258); ctx.lineTo(380,380); ctx.fill();
  // fireflies — glowing dots
  for(let i=0;i<35;i++){
    const fx=rand(10,370), fy=rand(190,360);
    const glow=ctx.createRadialGradient(fx,fy,0,fx,fy,rand(5,12));
    glow.addColorStop(0,`rgba(200,255,100,${rand(0.6,1)})`);
    glow.addColorStop(0.4,`rgba(180,240,80,${rand(0.2,0.4)})`);
    glow.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=glow; ctx.fillRect(fx-12,fy-12,24,24);
    ctx.fillStyle=`rgba(220,255,120,${rand(0.6,1)})`; ctx.beginPath(); ctx.arc(fx,fy,rand(1,2.5),0,Math.PI*2); ctx.fill();
  }
  return true;
}

/* ============================================================
   SCENE MAP
   ============================================================ */
const sceneMap = {
  morning: [drawSunrise, drawPastelDawn, drawMorningSea, drawFlowerMeadow, drawMistyForest, drawTeaCup, drawGoldenWheat, drawCherryBlossom],
  day:     [drawFlowerMeadow, drawMistyForest, drawTeaCup, drawRainyWindow, drawMorningSea, drawPastelDawn, drawGoldenWheat, drawCherryBlossom],
  evening: [drawStarryNight, drawSleepyCloudsNight, drawDeepNightMoon, drawSunset, drawCandlelight, drawRainyWindow, drawPastelNight, drawAuroraNight, drawFireflyNight]
};

/* ============================================================
   GENERATE
   ============================================================ */
function generate(type){
  currentType=type;
  ctx.clearRect(0,0,380,380);
  const scene=r(sceneMap[type]);
  const isDark=scene();
  const msg=makeMessage(type);
  drawText(msg,isDark);
  const wrap=document.getElementById("wrap");
  wrap.classList.add("visible");
  wrap.classList.remove("shown");
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{ wrap.classList.add("shown"); }); });
}

function downloadCard(){
  const link=document.createElement("a");
  link.download="card.png";
  link.href=canvas.toDataURL();
  link.click();
}
