<body>

<h1>Send a little love</h1>
<div class="time-label" id="timeLabel"></div>

<button onclick="generateAuto()">✦ Send a Card</button>

<button class="personalise-toggle" onclick="togglePanel()">✦ Personalise</button>

<div class="personalise-panel" id="panel">
  <div>
    <label>Friend's name or nickname</label>
    <input id="nickname" type="text" placeholder="e.g. Fatima">
  </div>
  <div>
    <label>A word that describes her</label>
    <input id="adjective" type="text" placeholder="e.g. radiant">
  </div>
  <div>
    <label>Your name (sign-off)</label>
    <input id="sender" type="text" placeholder="e.g. Noora">
  </div>
</div>

<div class="card-wrap" id="wrap">
  <canvas id="canvas"></canvas>
  <div class="card-actions">
    <button onclick="generateAuto()">Regenerate</button>
    <button onclick="shareCard()">Share</button>
    <button onclick="downloadCard()">Download</button>
  </div>
  <div class="share-feedback" id="shareFeedback"></div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const DPR = window.devicePixelRatio || 1;
const SIZE = 380;
canvas.width  = SIZE * DPR;
canvas.height = SIZE * DPR;
ctx.scale(DPR, DPR);

let currentType = null;

function getTimeType() {
  const h = new Date().getHours();
  if (h >= 5  && h < 12) return "morning";
  if (h >= 12 && h < 18) return "day";
  return "evening";
}

function updateTimeLabel() {
  const type = getTimeType();
  const labels = {
    morning: "Good morning — sending a morning card",
    day:     "Good day — sending an afternoon card",
    evening: "Good evening — sending an evening card"
  };
  document.getElementById("timeLabel").textContent = labels[type];
}

updateTimeLabel();

function generateAuto() { generate(getTimeType()); }
function togglePanel(){ document.getElementById("panel").classList.toggle("open"); }
function r(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function rand(min,max){ return Math.random()*(max-min)+min; }
function randInt(min,max){ return Math.floor(rand(min,max+1)); }

/* ═══════════════════════════════════════════
   SHARE
═══════════════════════════════════════════ */
async function shareCard() {
  const feedback = document.getElementById("shareFeedback");
  canvas.toBlob(async (blob) => {
    const file = new File([blob], "card.png", { type: "image/png" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: "A little love for you",
          text: "Someone's thinking of you ✦"
        });
        feedback.textContent = "Shared ✦";
      } catch(e) {
        if (e.name !== "AbortError") copyFallback(feedback);
      }
    } else {
      copyFallback(feedback);
    }
  }, "image/png");
}

function copyFallback(feedback) {
  canvas.toBlob(async (blob) => {
    try {
      await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
      feedback.textContent = "Copied to clipboard ✦";
    } catch(e) {
      feedback.textContent = "Use Download to save ✦";
    }
    setTimeout(() => { feedback.textContent = ""; }, 3000);
  }, "image/png");
}

/* ═══════════════════════════════════════════
   TEXT DRAWING
═══════════════════════════════════════════ */
function drawText(msg, dark){
  const W=SIZE, H=SIZE;
  const textColor = dark ? "#ffffff"               : "#1a1208";
  const subColor  = dark ? "rgba(255,255,255,0.92)" : "rgba(20,12,4,0.82)";
  const fromColor = dark ? "rgba(255,255,255,0.65)" : "rgba(20,12,4,0.5)";

  const ov = ctx.createLinearGradient(0, H*0.18, 0, H);
  if(dark){
    ov.addColorStop(0,"rgba(0,0,0,0)");
    ov.addColorStop(0.5,"rgba(0,0,0,0.28)");
    ov.addColorStop(1,"rgba(0,0,0,0.58)");
  } else {
    ov.addColorStop(0,"rgba(255,255,255,0)");
    ov.addColorStop(1,"rgba(255,255,255,0.48)");
  }
  ctx.fillStyle=ov; ctx.fillRect(0,0,W,H);

  ctx.shadowBlur=0; ctx.shadowColor="transparent";
  ctx.textAlign="center"; ctx.textBaseline="top";

  const cx=W/2, maxW=330;
  const F_GREET=`bold 28px Georgia,'Times New Roman',serif`;
  const F_WISH=`24px Georgia,'Times New Roman',serif`;
  const F_EXTRA=`italic 22px Georgia,'Times New Roman',serif`;
  const F_FROM=`italic 18px Georgia,'Times New Roman',serif`;
  const LH_GREET=36,LH_WISH=32,LH_EXTRA=30,LH_FROM=26;
  const GAP_AFTER_GREET=20,GAP_BETWEEN=12;

  function blockH(text,font,lh){
    ctx.font=font;
    const words=text.split(" ");
    let line="",lines=1;
    for(let i=0;i<words.length;i++){
      const test=line+words[i]+" ";
      if(ctx.measureText(test).width>maxW && i>0){ lines++; line=words[i]+" "; } else line=test;
    }
    return lines*lh;
  }

  const h1=blockH(msg.greeting,F_GREET,LH_GREET);
  const h2=blockH(msg.line2,F_WISH,LH_WISH);
  const h3=blockH(msg.line3,F_EXTRA,LH_EXTRA);
  const h4=msg.from?blockH(msg.from,F_FROM,LH_FROM):0;
  const totalH=h1+GAP_AFTER_GREET+h2+GAP_BETWEEN+h3+(h4?GAP_BETWEEN+h4:0);
  let y=Math.max(24,H/2-totalH/2);

  function drawBlock(text,font,lh,color){
    ctx.font=font; ctx.fillStyle=color;
    const words=text.split(" ");
    let line="",cy=y;
    for(let i=0;i<words.length;i++){
      const test=line+words[i]+" ";
      if(ctx.measureText(test).width>maxW && i>0){ ctx.fillText(line.trim(),cx,cy); line=words[i]+" "; cy+=lh; } else line=test;
    }
    ctx.fillText(line.trim(),cx,cy);
    return cy+lh;
  }

  y=drawBlock(msg.greeting,F_GREET,LH_GREET,textColor); y+=GAP_AFTER_GREET;
  y=drawBlock(msg.line2,F_WISH,LH_WISH,subColor); y+=GAP_BETWEEN;
  y=drawBlock(msg.line3,F_EXTRA,LH_EXTRA,subColor);
  if(msg.from){ y+=GAP_BETWEEN+4; drawBlock(msg.from,F_FROM,LH_FROM,fromColor); }
}

// SUNRISE variants
function drawSunrise(){ return _sunrise("#1a0a2e","#7a1a4a","#c0502a","#f4a030","#fde4a0",190,218,"#ffd060","#0d0608"); }
function drawSunriseBlue(){ return _sunrise("#0a0e28","#1a3a6a","#1a6a9a","#40a0c8","#c0e8f8",190,218,"#90d8f8","#040810"); }
function drawSunriseTeal(){ return _sunrise("#040e10","#0a3030","#106050","#30a870","#a0e8c0",190,218,"#60dfa0","#020808"); }
function drawSunriseRose(){ return _sunrise("#200818","#601830","#c04060","#e88090","#fcd8e0",190,218,"#ffb0c0","#100408"); }
function _sunrise(c0,c1,c2,c3,c4,sx,sy,sunC,treeC){
  const g=ctx.createLinearGradient(0,0,0,SIZE);
  g.addColorStop(0,c0); g.addColorStop(0.35,c1); g.addColorStop(0.65,c2); g.addColorStop(0.85,c3); g.addColorStop(1,c4);
  ctx.fillStyle=g; ctx.fillRect(0,0,SIZE,SIZE);
  ctx.fillStyle="rgba(255,200,80,0.13)"; ctx.beginPath(); ctx.arc(sx,sy,112,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="rgba(255,180,60,0.22)"; ctx.beginPath(); ctx.arc(sx,sy,66,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=sunC; ctx.beginPath(); ctx.arc(sx,sy,34,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=treeC;
  for(let i=0;i<7;i++){
    const tx=25+i*55+rand(-8,8),th=rand(65,115);
    ctx.beginPath(); ctx.moveTo(tx-14,SIZE); ctx.bezierCurveTo(tx-8,SIZE-th*0.5,tx+8,SIZE-th*0.75,tx+14,SIZE); ctx.fill();
  }
  return true;
}

  const g=ctx.createLinearGradient(0,0,0,SIZE);

  g.addColorStop(0,c0); g.addColorStop(0.5,c1); g.addColorStop(1,c2);
  ctx.fillStyle=g; ctx.fillRect(0,0,SIZE,SIZE);
  for(let i=0;i<60;i++){
    ctx.fillStyle=starC+rand(0.1,0.6)+")"; ctx.beginPath(); ctx.arc(rand(0,SIZE),rand(0,200),rand(0.3,1.2),0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle=moonGlow; ctx.beginPath(); ctx.arc(310,65,38,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=moonC; ctx.beginPath(); ctx.arc(310,65,18,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=hillC; ctx.beginPath(); ctx.moveTo(0,SIZE); ctx.bezierCurveTo(60,270,130,295,200,270); ctx.bezierCurveTo(260,250,320,275,SIZE,258); ctx.lineTo(SIZE,SIZE); ctx.fill();
  for(let i=0;i<35;i++){
    const fx=rand(10,370),fy=rand(190,360);
    const glow=ctx.createRadialGradient(fx,fy,0,fx,fy,rand(5,12));
    glow.addColorStop(0,glowC+rand(0.6,1)+")");
    glow.addColorStop(0.4,glowC.split(",")[0]+","+glowC.split(",")[1]+","+glowC.split(",")[2].replace(",","")+(glowC.includes("255,120") ? ",0.2)" : ",0.3)"));
    glow.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=glow; ctx.fillRect(fx-12,fy-12,24,24);
    ctx.fillStyle=dotC+rand(0.6,1)+")"; ctx.beginPath(); ctx.arc(fx,fy,rand(1,2.5),0,Math.PI*2); ctx.fill();
  }
  return true;
}

// CITY LIGHTS NIGHT variant
function drawCityLightsNight(){
  const g=ctx.createLinearGradient(0,0,0,SIZE);
  g.addColorStop(0,"#04060e"); g.addColorStop(0.6,"#0a0c1e"); g.addColorStop(1,"#060810");
  ctx.fillStyle=g; ctx.fillRect(0,0,SIZE,SIZE);
  for(let i=0;i<70;i++){
    ctx.fillStyle="rgba(220,225,255,"+rand(0.1,0.6)+")"; ctx.beginPath(); ctx.arc(rand(0,SIZE),rand(0,160),rand(0.3,1.2),0,Math.PI*2); ctx.fill();
  }
  const bldgC=["#0e1228","#101428","#0c1020","#12162e","#0a0e1c"];
  for(let i=0;i<12;i++){
    const bw=rand(22,45),bx=i*(SIZE/11)-10,bh=rand(80,200);
    ctx.fillStyle=bldgC[randInt(0,bldgC.length-1)];
    ctx.fillRect(bx,SIZE-bh,bw,bh);
    const winC=["rgba(255,220,120,0.9)","rgba(255,200,80,0.7)","rgba(200,220,255,0.8)","rgba(255,240,180,0.6)"];
    for(let wy=SIZE-bh+8;wy<SIZE-10;wy+=12){
      for(let wx=bx+4;wx<bx+bw-6;wx+=8){
        if(Math.random()>0.35){ ctx.fillStyle=winC[randInt(0,winC.length-1)]; ctx.fillRect(wx,wy,4,6); }
      }
    }
  }
  ctx.fillStyle="rgba(255,180,60,0.12)"; ctx.beginPath(); ctx.arc(190,340,100,0,Math.PI*2); ctx.fill();
  return true;
}

function _desertMoon(c0,c1,c2,c3,gs1,gs2,moonC,moonShadow,cactusC){
  const g=ctx.createLinearGradient(0,0,0,SIZE);
  g.addColorStop(0,c0); g.addColorStop(0.4,c1); g.addColorStop(0.75,c2); g.addColorStop(1,c3);
  ctx.fillStyle=g; ctx.fillRect(0,0,SIZE,SIZE);
  for(let i=0;i<80;i++){
    ctx.fillStyle="rgba(255,245,200,"+rand(0.2,0.9)+")"; ctx.beginPath(); ctx.arc(rand(0,SIZE),rand(0,220),rand(0.3,1.5),0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle=gs1; ctx.beginPath(); ctx.arc(300,75,52,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=gs2; ctx.beginPath(); ctx.arc(300,75,33,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=moonC; ctx.beginPath(); ctx.arc(300,75,20,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=moonShadow; ctx.beginPath(); ctx.arc(310,68,17,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=c3;
  ctx.beginPath(); ctx.moveTo(0,SIZE); ctx.bezierCurveTo(100,SIZE-40,220,SIZE-25,SIZE,SIZE-35); ctx.lineTo(SIZE,SIZE); ctx.fill();
  function cactus(cx2,baseY,h){
    ctx.fillStyle=cactusC;
    ctx.fillRect(cx2-5,baseY-h,10,h);
    ctx.fillRect(cx2-18,baseY-h*0.6,13,7);
    ctx.fillRect(cx2-18,baseY-h*0.75,7,h*0.2);
    ctx.fillRect(cx2+5,baseY-h*0.45,13,7);
    ctx.fillRect(cx2+11,baseY-h*0.62,7,h*0.22);
  }
  cactus(70,SIZE-30,80); cactus(280,SIZE-28,95); cactus(160,SIZE-35,60); cactus(340,SIZE-32,70);
  return true;
}

function _sleepyClouds(c0,c1,c2,mg1,mg2,moonC,cloudC,zC,hillC){
  const g=ctx.createLinearGradient(0,0,0,SIZE);
  g.addColorStop(0,c0); g.addColorStop(0.6,c1); g.addColorStop(1,c2);
  ctx.fillStyle=g; ctx.fillRect(0,0,SIZE,SIZE);
  for(let i=0;i<80;i++){
    ctx.fillStyle="rgba(220,225,255,"+rand(0.2,0.85)+")"; ctx.beginPath(); ctx.arc(rand(0,SIZE),rand(0,220),rand(0.3,1.6),0,Math.PI*2); ctx.fill();
  }
  ctx.fillStyle=mg1; ctx.beginPath(); ctx.arc(100,90,60,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=mg2; ctx.beginPath(); ctx.arc(100,90,40,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=moonC; ctx.beginPath(); ctx.arc(100,90,25,0,Math.PI*2); ctx.fill();
  function sleepyCloud(scx,scy,sc,al){
    ctx.save(); ctx.globalAlpha=al; ctx.fillStyle=cloudC;
    ctx.beginPath(); ctx.ellipse(scx,scy,55*sc,22*sc,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(scx-20*sc,scy-14*sc,28*sc,18*sc,-0.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(scx+10*sc,scy-16*sc,32*sc,20*sc,0.15,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(scx+35*sc,scy-8*sc,22*sc,15*sc,0.1,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=al*0.7; ctx.fillStyle=zC;
    ctx.font="bold "+Math.round(11*sc)+"px Georgia,serif"; ctx.textAlign="left";
    ctx.fillText("z",scx+50*sc,scy-22*sc);
    ctx.font="bold "+Math.round(9*sc)+"px Georgia,serif"; ctx.fillText("z",scx+60*sc,scy-34*sc);
    ctx.font="bold "+Math.round(7*sc)+"px Georgia,serif"; ctx.fillText("z",scx+68*sc,scy-44*sc);
    ctx.restore();
  }
  sleepyCloud(160,155,1.0,0.55); sleepyCloud(50,205,0.75,0.4); sleepyCloud(275,235,0.85,0.45);
  ctx.fillStyle=hillC; ctx.beginPath(); ctx.moveTo(0,SIZE); ctx.bezierCurveTo(100,312,250,332,SIZE,310); ctx.lineTo(SIZE,SIZE); ctx.fill();
  return true;
}

/* ═══════════════════════════════════════════
   GENERATE & DOWNLOAD
═══════════════════════════════════════════ */
function generate(type){
  currentType=type;
  ctx.clearRect(0,0,SIZE,SIZE);
  const scene=r(sceneMap[type]);
  const isDark=scene();
  const msg=makeMessage(type);
  drawText(msg,isDark);
  const wrap=document.getElementById("wrap");
  wrap.classList.add("visible");
  wrap.classList.remove("shown");
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>{ wrap.classList.add("shown"); }); });
}

function downloadCard(){
  const link=document.createElement("a");
  link.download="card.png";
  link.href=canvas.toDataURL();
  link.click();
}
